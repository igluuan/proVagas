  #     - DB_NAME=${DB_NAME:vagas_db}
  #     - DB_USER=${DB_USER:postgres}
  #     - DB_PASSWORD=${DB_PASSWORD:postgres123}
  #   ports:
  #     - "${APP_PORT}:8080"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge