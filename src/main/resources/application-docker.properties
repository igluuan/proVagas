# Docker Profile - Database Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/${DB_NAME:vagas_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for Docker
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Application Configuration
server.port=8080

# Logging Configuration for Docker
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Admin User Configuration
app.security.admin.username=admin
app.security.admin.password=${ADMIN_PASSWORD}
app.security.admin.email=admin@system.com
app.security.admin.roles=ADMIN

# JWT Configuration
app.security.jwt.secret-key=${JWT_SECRET_KEY}
app.security.jwt.issuer=proVagas-api
app.security.jwt.expiration-time-minutes=60
app.security.jwt.refresh-token.expiration-time-days=7