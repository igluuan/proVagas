# Docker Profile - Database Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/${DB_NAME:vagas_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for Docker
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Application Configuration
server.port=8080

# Logging Configuration for Docker
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
jwt.public.key=${JWT_PUBLIC_KEY_PATH:classpath:certs/app.pub}
jwt.private.key=${JWT_PRIVATE_KEY_PATH:classpath:certs/app.key}