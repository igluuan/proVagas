<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste do Dashboard</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Elementos do Dashboard</h5>
                        <p><strong>Nome na navbar:</strong> <span id="user-name">Usuário</span></p>
                        <p><strong>Nome no welcome:</strong> <span id="welcome-name">Usuário</span></p>
                        <p><strong>Avatar:</strong> <img id="user-avatar" src="" alt="Avatar" width="32" height="32" class="rounded-circle"></p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Controles</h5>
                        <button class="btn btn-primary mb-2" onclick="testLoadUserProfile()">Testar Carregamento</button>
                        <button class="btn btn-secondary mb-2" onclick="clearToken()">Limpar Token</button>
                        <button class="btn btn-info mb-2" onclick="setTestToken()">Definir Token de Teste</button>
                        <div id="debug-info" class="mt-3">
                            <small class="text-muted">Token: <span id="token-display">Nenhum</span></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5>Logs de Debug</h5>
                        <div id="debug-logs" style="height: 200px; overflow-y: scroll; background: #f8f9fa; padding: 10px; font-family: monospace; font-size: 12px;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para adicionar logs
        function addLog(message) {
            const logsDiv = document.getElementById('debug-logs');
            const timestamp = new Date().toLocaleTimeString();
            logsDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // Função para definir token de teste
        function setTestToken() {
            const testToken = 'eyJhbGciOiJSUzI1NiJ9.eyJpc3MiOiJwcm9WYWdhcy1zZXJ2aWNlIiwic3ViIjoibWFyY29zQGV4YW1wbGUuY29tIiwiZXhwIjoxNzUyODk3MjkwLCJzY29wZSI6IlVTRVIifQ.OW5gNdaMa3cQLvNBF0zDP8UtPGimufceFrl_uPA9NLCYuhTkEKBWd33mtZzWwRbUqd-pFVRbd23SMqO0-eAbr1ypgY-z2knHD0IeUwk_7AnpluOWZrP4_iU62vFoPxf6J5xsgJcEIyG57g6a49ojlHGvSqsiToZOMC0m9-ekqQrBcYXSIGFAwPvEOYaz_LWuR-MKOPRpluao-MpOQKwnbeKUQgDwnaXPNdu44znIaVwLvi8X6dvRQZS1hq7vs4g7mtnR80TGMLYsOMLBEj_e9I4gTcSKSL_43yiHE5xgZB_G9xAbtStsx2M3SqJwRSsMljXa-aukBy2kRKU1RzVW2Q';
            localStorage.setItem('jwt_token', testToken);
            document.getElementById('token-display').textContent = testToken.substring(0, 50) + '...';
            addLog('Token de teste definido');
        }

        // Função para limpar token
        function clearToken() {
            localStorage.removeItem('jwt_token');
            document.getElementById('token-display').textContent = 'Nenhum';
            addLog('Token removido');
        }

        // Função para testar carregamento do perfil
        async function testLoadUserProfile() {
            addLog('Iniciando teste de carregamento do perfil...');
            
            try {
                const token = localStorage.getItem('jwt_token');
                if (!token) {
                    addLog('ERRO: Token não encontrado');
                    return;
                }

                addLog('Token encontrado, fazendo requisição...');
                
                const response = await fetch('/api/users/profile', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                addLog(`Resposta da API: ${response.status}`);

                if (response.ok) {
                    const userData = await response.json();
                    addLog(`Dados recebidos: ${JSON.stringify(userData)}`);
                    
                    // Atualizar elementos
                    const userNameElement = document.getElementById('user-name');
                    const welcomeNameElement = document.getElementById('welcome-name');
                    const avatarElement = document.getElementById('user-avatar');
                    
                    if (userNameElement) {
                        userNameElement.textContent = userData.name;
                        addLog(`Nome atualizado na navbar: ${userData.name}`);
                    }
                    
                    if (welcomeNameElement) {
                        welcomeNameElement.textContent = userData.name;
                        addLog(`Nome atualizado no welcome: ${userData.name}`);
                    }
                    
                    if (avatarElement) {
                        const initials = userData.name.split(' ').map(n => n[0]).join('').toUpperCase();
                        avatarElement.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(initials)}&background=6a11cb&color=fff`;
                        addLog(`Avatar atualizado para: ${userData.name}`);
                    }
                    
                    addLog('Teste concluído com sucesso!');
                } else {
                    addLog(`ERRO: ${response.status} - ${response.statusText}`);
                }
            } catch (error) {
                addLog(`ERRO: ${error.message}`);
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            addLog('Página carregada');
            
            const token = localStorage.getItem('jwt_token');
            if (token) {
                document.getElementById('token-display').textContent = token.substring(0, 50) + '...';
                addLog('Token encontrado no localStorage');
            } else {
                addLog('Nenhum token encontrado');
            }
        });
    </script>
</body>
</html>
